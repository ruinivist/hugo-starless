{{ define "main" }}
  <div class="content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </div>
  <div class="page-actions">
    <a class="page-link" href="{{ printf "/%s/" .Section | relLangURL }}">
      {{ .Section }} <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <hr class="rule">
  </div>
  <div class="footer-note page-footer">
    {{ site.Params.homeFooter }}
  </div>
{{ end }}
